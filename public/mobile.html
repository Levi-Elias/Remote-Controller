<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curve Fever Controller</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #000;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .controller {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 90vw;
            width: 100%;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.5em;
            color: white;
        }

        .join-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 16px;
            background-color: #111;
            color: white;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #ccc;
        }

        #joinBtn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid white;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #333;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #joinBtn:hover {
            background-color: #555;
        }

        #joinBtn:active {
            background-color: #777;
        }

        .game-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .status {
            margin-bottom: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
        }

        .status p {
            margin: 5px 0;
            font-size: 14px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 500px;
        }

        .buttons button {
            flex: 1;
            max-width: 150px;
            height: 80px;
            font-size: 36px;
            padding: 0;
            border-radius: 10px;
            background-color: #333;
            border: 2px solid white;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .buttons button:hover {
            background-color: #555;
            transform: scale(1.05);
        }

        .buttons button:active {
            background-color: #777;
            transform: scale(0.95);
        }

        .join-form,
        .game-controls {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (orientation: landscape) {
            .controller {
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                padding: 15px;
            }

            h1 {
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                margin: 0;
                font-size: 1.2em;
            }

            .join-form,
            .game-controls {
                flex: 1;
                max-width: 45%;
            }

            .buttons {
                gap: 60px;
            }

            .buttons button {
                height: 100px;
                font-size: 48px;
                max-width: 200px;
            }
        }
    </style>
</head>

<body>
    <div class="controller">
        <h1>Curve Fever Controller</h1>

        <div class="join-form">
            <input type="text" id="gameCode" placeholder="Enter 6-letter Game Code" maxlength="6"
                style="text-transform: uppercase;">
            <input type="text" id="playerName" placeholder="Enter Your Name" maxlength="20">
            <button id="joinBtn">Join Game</button>
        </div>

        <div class="game-controls">
            <div class="status">
                <p>Name: <span id="playerNameDisplay"></span></p>
                <p>Status: <span id="status">Waiting to join</span></p>
            </div>
            <div class="buttons">
                <button id="leftBtn">←</button>
                <button id="rightBtn">→</button>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://' + window.location.hostname + ':3002');
        let playerId = null;
        let playerName = '';

        ws.onopen = () => {
            console.log('Connected');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'init') {
                playerId = data.playerId;
            } else if (data.type === 'error') {
                alert(data.message);
            } else if (data.type === 'reset') {
                // Reset to join form
                document.querySelector('.join-form').style.display = 'block';
                document.querySelector('.game-controls').style.display = 'none';
                document.getElementById('status').textContent = 'Game reset - join again';
                playerName = '';
            }
        };

        ws.onclose = () => {
            document.getElementById('status').textContent = 'Disconnected';
        };

        document.getElementById('joinBtn').addEventListener('click', () => {
            const code = document.getElementById('gameCode').value.toUpperCase();
            playerName = document.getElementById('playerName').value.trim();
            if (code.length === 6 && playerName) {
                ws.send(JSON.stringify({ type: 'join', code, name: playerName }));
                document.querySelector('.join-form').style.display = 'none';
                document.querySelector('.game-controls').style.display = 'block';
                document.getElementById('playerNameDisplay').textContent = playerName;
                document.getElementById('status').textContent = 'Joined';
            } else {
                alert('Please enter a valid 6-letter code and name');
            }
        });

        let activeInput = { left: false, right: false };

        function sendInput() {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', input: activeInput }));
            }
        }

        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        const pressLeft = (e) => { e.preventDefault(); activeInput.left = true; sendInput(); };
        const releaseLeft = (e) => { e.preventDefault(); activeInput.left = false; sendInput(); };
        
        const pressRight = (e) => { e.preventDefault(); activeInput.right = true; sendInput(); };
        const releaseRight = (e) => { e.preventDefault(); activeInput.right = false; sendInput(); };

        // Bind events for holding buttons down
        leftBtn.addEventListener('mousedown', pressLeft);
        leftBtn.addEventListener('touchstart', pressLeft, { passive: false });
        leftBtn.addEventListener('mouseup', releaseLeft);
        leftBtn.addEventListener('mouseleave', releaseLeft);
        leftBtn.addEventListener('touchend', releaseLeft);
        leftBtn.addEventListener('touchcancel', releaseLeft);

        rightBtn.addEventListener('mousedown', pressRight);
        rightBtn.addEventListener('touchstart', pressRight, { passive: false });
        rightBtn.addEventListener('mouseup', releaseRight);
        rightBtn.addEventListener('mouseleave', releaseRight);
        rightBtn.addEventListener('touchend', releaseRight);
        rightBtn.addEventListener('touchcancel', releaseRight);
    </script>
</body>

</html>
